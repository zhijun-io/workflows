# Reusable Snapshot Publishing Workflow with CLI Tool Support
#
# Extended version of publish-snapshot.yml that supports:
# - CLI tool installations for integration tests
# - API keys for tests before publishing (repo-specific)
#
# Usage in calling repository:
# jobs:
#   publish:
#     uses: zhijun-io/workflows/.github/workflows/publish-snapshot-with-cli.yml@main
#     with:
#       install-claude-cli: true
#       install-gemini-cli: true
#     secrets:
#       MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
#       MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
#       ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#       GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

name: Publish Snapshot with CLI Tools

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '21'
      java-distribution:
        description: 'Java distribution to use'
        required: false
        type: string
        default: 'temurin'
      node-version:
        description: 'Node.js version for CLI tools'
        required: false
        type: string
        default: '20'
      skip-tests:
        description: 'Skip running tests before publish'
        required: false
        type: boolean
        default: false
      verify-first:
        description: 'Run verify before deploy'
        required: false
        type: boolean
        default: true
      # CLI installation options
      install-claude-cli:
        description: 'Install Claude Code CLI'
        required: false
        type: boolean
        default: false
      install-gemini-cli:
        description: 'Install Gemini CLI'
        required: false
        type: boolean
        default: false
      install-vendir-cli:
        description: 'Install Vendir CLI'
        required: false
        type: boolean
        default: false
      vendir-version:
        description: 'Vendir CLI version'
        required: false
        type: string
        default: '0.44.0'
      # Validation options
      validate-commits:
        description: 'Validate commit messages for AI attribution'
        required: false
        type: boolean
        default: false
    secrets:
      MAVEN_USERNAME:
        description: 'Maven Central username'
        required: true
      MAVEN_PASSWORD:
        description: 'Maven Central password/token'
        required: true
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key for Claude CLI (repo-specific)'
        required: false
      GEMINI_API_KEY:
        description: 'Google API key for Gemini CLI (repo-specific)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.validate-commits && '0' || '1' }}

      - name: Validate commit messages
        if: ${{ inputs.validate-commits }}
        run: |
          echo "Checking commit messages for AI attribution..."

          COMMIT=$(git rev-parse HEAD)
          echo "Checking commit: $COMMIT"
          COMMIT_MSG=$(git log --format=%B -n 1 $COMMIT)

          if echo "$COMMIT_MSG" | grep -qE "(🤖.*Claude|Co-Authored-By.*Claude)"; then
            echo "❌ ERROR: Commit contains Claude attribution"
            echo "🚫 Cannot publish snapshots with AI attribution."
            exit 1
          else
            echo "✅ Commit message is clean"
          fi

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Setup Node.js
        if: ${{ inputs.install-claude-cli || inputs.install-gemini-cli }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install Claude Code CLI
        if: ${{ inputs.install-claude-cli }}
        run: |
          npm install -g @anthropic-ai/claude-code --silent
          echo "✅ Claude Code CLI installed"

      - name: Install Gemini CLI
        if: ${{ inputs.install-gemini-cli }}
        run: |
          npm install -g @google/gemini-cli --silent
          echo "✅ Gemini CLI installed"

      - name: Install Vendir CLI
        if: ${{ inputs.install-vendir-cli }}
        run: |
          curl -fsSL https://github.com/vmware-tanzu/carvel-vendir/releases/download/v${{ inputs.vendir-version }}/vendir-linux-amd64 \
            -o /tmp/vendir && sudo mv /tmp/vendir /usr/local/bin/vendir && sudo chmod +x /usr/local/bin/vendir
          echo "✅ Vendir CLI v${{ inputs.vendir-version }} installed"

      - name: Verify CLI installations
        if: ${{ inputs.install-claude-cli || inputs.install-gemini-cli || inputs.install-vendir-cli }}
        run: |
          echo "=== Verifying CLI installations ==="
          if [ "${{ inputs.install-claude-cli }}" = "true" ]; then
            command -v claude && echo "✅ Claude CLI: $(claude --version 2>&1)" || echo "❌ Claude CLI not found"
          fi
          if [ "${{ inputs.install-gemini-cli }}" = "true" ]; then
            command -v gemini && echo "✅ Gemini CLI: $(gemini --version 2>&1)" || echo "❌ Gemini CLI not found"
          fi
          if [ "${{ inputs.install-vendir-cli }}" = "true" ]; then
            command -v vendir && echo "✅ Vendir CLI: $(vendir --version 2>&1)" || echo "❌ Vendir CLI not found"
          fi

      - name: Build and verify
        if: ${{ inputs.verify-first }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ inputs.skip-tests }}" = "true" ]; then
            ./mvnw clean verify -B -DskipTests
          else
            ./mvnw clean verify -B
          fi

      - name: Publish snapshot to Maven Central
        run: ./mvnw deploy -B -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
