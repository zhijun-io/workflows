# Reusable CI Build Workflow with CLI Tool Support
#
# Extended version of ci-build.yml that supports:
# - CLI tool installations (Claude, Gemini, Vendir)
# - API keys for integration tests (repo-specific secrets)
# - Commit validation for AI attribution
#
# Usage in calling repository:
# jobs:
#   build:
#     uses: zhijun-io/workflows/.github/workflows/ci-build-with-cli.yml@main
#     with:
#       install-claude-cli: true
#       install-gemini-cli: true
#     secrets:
#       ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#       GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

name: CI Build with CLI Tools

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '21'
      java-distribution:
        description: 'Java distribution to use'
        required: false
        type: string
        default: 'temurin'
      node-version:
        description: 'Node.js version for CLI tools'
        required: false
        type: string
        default: '20'
      maven-goals:
        description: 'Maven goals to run'
        required: false
        type: string
        default: 'clean verify -B'
      skip-tests:
        description: 'Skip running tests'
        required: false
        type: boolean
        default: false
      upload-test-results:
        description: 'Upload test results as artifact'
        required: false
        type: boolean
        default: true
      # CLI installation options
      install-claude-cli:
        description: 'Install Claude Code CLI'
        required: false
        type: boolean
        default: false
      install-gemini-cli:
        description: 'Install Gemini CLI'
        required: false
        type: boolean
        default: false
      install-vendir-cli:
        description: 'Install Vendir CLI'
        required: false
        type: boolean
        default: false
      vendir-version:
        description: 'Vendir CLI version'
        required: false
        type: string
        default: '0.44.0'
      # Validation options
      validate-commits:
        description: 'Validate commit messages for AI attribution'
        required: false
        type: boolean
        default: false
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key for Claude CLI (repo-specific)'
        required: false
      GEMINI_API_KEY:
        description: 'Google API key for Gemini CLI (repo-specific)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.validate-commits && '0' || '1' }}

      - name: Validate commit messages
        if: ${{ inputs.validate-commits }}
        run: |
          echo "Checking commit messages for AI attribution..."

          FOUND_ATTRIBUTION=false

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Checking commits in PR from ${{ github.event.pull_request.base.sha }} to ${{ github.event.pull_request.head.sha }}"
            COMMITS=$(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})

            for commit in $COMMITS; do
              echo "Checking commit: $commit"
              COMMIT_MSG=$(git log --format=%B -n 1 $commit)

              if echo "$COMMIT_MSG" | grep -qE "(🤖.*Claude|Co-Authored-By.*Claude)"; then
                echo "❌ ERROR: Commit $commit contains Claude attribution"
                FOUND_ATTRIBUTION=true
              fi
            done
          else
            COMMIT=$(git rev-parse HEAD)
            echo "Checking pushed commit: $COMMIT"
            COMMIT_MSG=$(git log --format=%B -n 1 $COMMIT)

            if echo "$COMMIT_MSG" | grep -qE "(🤖.*Claude|Co-Authored-By.*Claude)"; then
              echo "❌ ERROR: Commit $COMMIT contains Claude attribution"
              FOUND_ATTRIBUTION=true
            fi
          fi

          if [ "$FOUND_ATTRIBUTION" = true ]; then
            echo ""
            echo "🚫 Found AI attribution in commit messages."
            echo "See CLAUDE.md for commit message guidelines."
            exit 1
          else
            echo "✅ All commit messages are clean"
          fi

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: maven

      - name: Setup Node.js
        if: ${{ inputs.install-claude-cli || inputs.install-gemini-cli }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install Claude Code CLI
        if: ${{ inputs.install-claude-cli }}
        run: |
          npm install -g @anthropic-ai/claude-code --silent
          echo "✅ Claude Code CLI installed"

      - name: Install Gemini CLI
        if: ${{ inputs.install-gemini-cli }}
        run: |
          npm install -g @google/gemini-cli --silent
          echo "✅ Gemini CLI installed"

      - name: Install Vendir CLI
        if: ${{ inputs.install-vendir-cli }}
        run: |
          curl -fsSL https://github.com/vmware-tanzu/carvel-vendir/releases/download/v${{ inputs.vendir-version }}/vendir-linux-amd64 \
            -o /tmp/vendir && sudo mv /tmp/vendir /usr/local/bin/vendir && sudo chmod +x /usr/local/bin/vendir
          echo "✅ Vendir CLI v${{ inputs.vendir-version }} installed"

      - name: Verify CLI installations
        if: ${{ inputs.install-claude-cli || inputs.install-gemini-cli || inputs.install-vendir-cli }}
        run: |
          echo "=== Verifying CLI installations ==="
          if [ "${{ inputs.install-claude-cli }}" = "true" ]; then
            command -v claude && echo "✅ Claude CLI: $(claude --version 2>&1)" || echo "❌ Claude CLI not found"
          fi
          if [ "${{ inputs.install-gemini-cli }}" = "true" ]; then
            command -v gemini && echo "✅ Gemini CLI: $(gemini --version 2>&1)" || echo "❌ Gemini CLI not found"
          fi
          if [ "${{ inputs.install-vendir-cli }}" = "true" ]; then
            command -v vendir && echo "✅ Vendir CLI: $(vendir --version 2>&1)" || echo "❌ Vendir CLI not found"
          fi

      - name: Build with Maven
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ inputs.skip-tests }}" = "true" ]; then
            ./mvnw ${{ inputs.maven-goals }} -DskipTests
          else
            ./mvnw ${{ inputs.maven-goals }}
          fi

      - name: Upload test results
        if: ${{ inputs.upload-test-results && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7
