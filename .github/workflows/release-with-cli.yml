# Reusable Maven Central Release Workflow with CLI Tool Support
#
# Extended version of release.yml that supports:
# - CLI tool installations for integration tests before release
# - API keys for tests (repo-specific)
#
# Usage in calling repository:
# jobs:
#   release:
#     uses: zhijun-io/workflows/.github/workflows/release-with-cli.yml@main
#     with:
#       version: ${{ inputs.version }}
#       install-claude-cli: true
#       install-gemini-cli: true
#     secrets:
#       MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
#       MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
#       GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
#       GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
#       ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#       GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

name: Maven Central Release with CLI Tools

on:
  workflow_call:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        type: string
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '21'
      java-distribution:
        description: 'Java distribution to use'
        required: false
        type: string
        default: 'temurin'
      node-version:
        description: 'Node.js version for CLI tools'
        required: false
        type: string
        default: '20'
      skip-tests:
        description: 'Skip running tests'
        required: false
        type: boolean
        default: false
      create-tag:
        description: 'Create and push Git tag'
        required: false
        type: boolean
        default: true
      tag-prefix:
        description: 'Tag prefix (e.g., v for v0.1.0)'
        required: false
        type: string
        default: 'v'
      # CLI installation options
      install-claude-cli:
        description: 'Install Claude Code CLI'
        required: false
        type: boolean
        default: false
      install-gemini-cli:
        description: 'Install Gemini CLI'
        required: false
        type: boolean
        default: false
      install-vendir-cli:
        description: 'Install Vendir CLI'
        required: false
        type: boolean
        default: false
      vendir-version:
        description: 'Vendir CLI version'
        required: false
        type: string
        default: '0.44.0'
      # Validation options
      validate-commits:
        description: 'Validate commit messages for AI attribution'
        required: false
        type: boolean
        default: false
    secrets:
      MAVEN_USERNAME:
        description: 'Maven Central username'
        required: true
      MAVEN_PASSWORD:
        description: 'Maven Central password/token'
        required: true
      GPG_SECRET_KEY:
        description: 'GPG private key for signing'
        required: true
      GPG_PASSPHRASE:
        description: 'GPG passphrase'
        required: true
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key for Claude CLI (repo-specific)'
        required: false
      GEMINI_API_KEY:
        description: 'Google API key for Gemini CLI (repo-specific)'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.validate-commits && '0' || '1' }}

      - name: Validate commit messages
        if: ${{ inputs.validate-commits }}
        run: |
          echo "Checking commit messages for AI attribution..."

          COMMIT=$(git rev-parse HEAD)
          echo "Checking commit: $COMMIT"
          COMMIT_MSG=$(git log --format=%B -n 1 $COMMIT)

          if echo "$COMMIT_MSG" | grep -qE "(🤖.*Claude|Co-Authored-By.*Claude)"; then
            echo "❌ ERROR: Commit contains Claude attribution"
            echo "🚫 Cannot release with AI attribution in commits."
            exit 1
          else
            echo "✅ Commit message is clean"
          fi

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Setup Node.js
        if: ${{ inputs.install-claude-cli || inputs.install-gemini-cli }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install Claude Code CLI
        if: ${{ inputs.install-claude-cli }}
        run: |
          npm install -g @anthropic-ai/claude-code --silent
          echo "✅ Claude Code CLI installed"

      - name: Install Gemini CLI
        if: ${{ inputs.install-gemini-cli }}
        run: |
          npm install -g @google/gemini-cli --silent
          echo "✅ Gemini CLI installed"

      - name: Install Vendir CLI
        if: ${{ inputs.install-vendir-cli }}
        run: |
          curl -fsSL https://github.com/vmware-tanzu/carvel-vendir/releases/download/v${{ inputs.vendir-version }}/vendir-linux-amd64 \
            -o /tmp/vendir && sudo mv /tmp/vendir /usr/local/bin/vendir && sudo chmod +x /usr/local/bin/vendir
          echo "✅ Vendir CLI v${{ inputs.vendir-version }} installed"

      - name: Verify CLI installations
        if: ${{ inputs.install-claude-cli || inputs.install-gemini-cli || inputs.install-vendir-cli }}
        run: |
          echo "=== Verifying CLI installations ==="
          if [ "${{ inputs.install-claude-cli }}" = "true" ]; then
            command -v claude && echo "✅ Claude CLI: $(claude --version 2>&1)" || echo "❌ Claude CLI not found"
          fi
          if [ "${{ inputs.install-gemini-cli }}" = "true" ]; then
            command -v gemini && echo "✅ Gemini CLI: $(gemini --version 2>&1)" || echo "❌ Gemini CLI not found"
          fi
          if [ "${{ inputs.install-vendir-cli }}" = "true" ]; then
            command -v vendir && echo "✅ Vendir CLI: $(vendir --version 2>&1)" || echo "❌ Vendir CLI not found"
          fi

      - name: Set version
        run: ./mvnw -ntp versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Verify no SNAPSHOT dependencies
        run: |
          if grep -r "SNAPSHOT" --include="pom.xml" . | grep -v "<!--" | grep -v "target/"; then
            echo "ERROR: Found SNAPSHOT references in POM files"
            exit 1
          fi
          echo "No SNAPSHOT dependencies found"

      - name: Build and verify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ inputs.skip-tests }}" = "true" ]; then
            ./mvnw clean verify -B -ntp -DskipTests
          else
            ./mvnw clean verify -B -ntp
          fi

      - name: Publish release to Maven Central
        run: ./mvnw deploy -B -DskipTests -Prelease
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create Git tag
        if: ${{ inputs.create-tag }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a ${{ inputs.tag-prefix }}${{ inputs.version }} -m "Release ${{ inputs.tag-prefix }}${{ inputs.version }}"
          git push origin ${{ inputs.tag-prefix }}${{ inputs.version }}

      - name: Create GitHub Release
        if: ${{ inputs.create-tag }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag-prefix }}${{ inputs.version }}
          name: Release ${{ inputs.version }}
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
          generate_release_notes: true

      - name: Bump to next SNAPSHOT version
        if: ${{ inputs.create-tag }}
        run: |
          # Parse version and increment minor: 0.13.0 -> 0.14.0-SNAPSHOT
          IFS='.' read -r major minor patch <<< "${{ inputs.version }}"
          NEXT_VERSION="${major}.$((minor + 1)).0-SNAPSHOT"
          echo "Bumping to next development version: ${NEXT_VERSION}"
          ./mvnw -ntp versions:set -DnewVersion=${NEXT_VERSION} -DgenerateBackupPoms=false
          git add -A
          git commit -m "Bump development version to ${NEXT_VERSION}"
          git push origin HEAD:main
